<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Dashboard</title>
    <style>
        body {
            background: #0e1117;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .card {
            background: #161b22;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 12px;
        }

        .long { color: #00ff88; }
        .short { color: #ff4d4d; }
        .neutral { color: #bbbbbb; }

        button {
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>Claude AI Trading Dashboard</h1>

<div class="card">
    <h2>Live Signal</h2>
    <div id="signal">Waiting...</div>
    <div id="confidence"></div>
    <div id="reason"></div>
    <div id="risk"></div>

    <button onclick="getSignal()">Refresh Signal</button>
</div>

<script>
async function getSignal() {

    // MOCK LIVE MARKET DATA (replace later with real feed)
    const marketData = {
        price: 100 + Math.random() * 10,
        volume: 1200,
        trend_speed: Math.random(),
        macd: Math.random() * 2 - 1,
        cvd: "bullish",
        atr: Math.random()
    };

    const response = await fetch("http://127.0.0.1:8000/live-signal", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(marketData)
    });

    const data = await response.json();

    const signal = data.signal;

    document.getElementById("signal").innerText = signal.direction;
    document.getElementById("confidence").innerText = "Confidence: " + signal.confidence;
    document.getElementById("reason").innerText = signal.reason;
    document.getElementById("risk").innerText = "Risk: " + signal.risk;

    // color logic
    const signalBox = document.getElementById("signal");
    signalBox.className = signal.direction === "LONG"
        ? "long"
        : signal.direction === "SHORT"
        ? "short"
        : "neutral";
}

setInterval(getSignal, 5000); // auto-refresh every 5 seconds
</script>

</body>
</html>
